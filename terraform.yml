name: terraform

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write    # OIDC token for Azure auth
  contents: read
  pull-requests: write  # Post plan as PR comment

jobs:
  #############################################
  # Quality gate: format, validate, lint
  #############################################
  validate:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Formatting check — fails fast if code isn't canonical.
      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (dev backend)
        run: terraform init -backend-config=envs/dev/backend.tfbackend

      - name: Terraform validate
        run: terraform validate

      - name: TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          tflint

  #############################################
  # Plan dev — post diff to PR
  #############################################
  plan-dev:
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config=envs/dev/backend.tfbackend

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = changes present.
      # Capture the exit code so we can distinguish "error" from "has changes".
      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -var-file=envs/dev/dev.tfvars -out=plan.tfplan -detailed-exitcode
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Render plan to text
        if: steps.plan.outputs.exitcode != '1'
        run: terraform show -no-color plan.tfplan > plan.txt

      # Post plan output as a PR comment so reviewers see the diff
      # without downloading artifacts or running plan locally.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `#### 📋 Terraform Plan — \`dev\`
            \`\`\`
            ${truncated}
            \`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Fail the job if plan returned an error (exit 1). Exit 2 = changes, which is OK.
      - name: Check plan status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: dev-plan
          path: plan.txt

  #############################################
  # Apply dev — only on main, after plan
  #############################################
  apply-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config=envs/dev/backend.tfbackend

      - name: Terraform apply
        run: terraform apply -var-file=envs/dev/dev.tfvars -auto-approve

  #############################################
  # Plan prod — same pattern, separate env
  #############################################
  plan-prod:
    runs-on: ubuntu-latest
    needs: validate
    environment: prod
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config=envs/prod/backend.tfbackend

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -var-file=envs/prod/prod.tfvars -out=plan.tfplan -detailed-exitcode
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Render plan to text
        if: steps.plan.outputs.exitcode != '1'
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `#### 📋 Terraform Plan — \`prod\`
            \`\`\`
            ${truncated}
            \`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check plan status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: prod-plan
          path: plan.txt

  #############################################
  # Apply prod — main only, requires approval
  #############################################
  # NOTE: Configure GitHub Environment "prod" with required reviewers
  # (Settings → Environments → prod → Required reviewers).
  # This creates a manual approval gate before prod deploy.
  apply-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod    # ← approval gate lives here
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config=envs/prod/backend.tfbackend

      - name: Terraform apply
        run: terraform apply -var-file=envs/prod/prod.tfvars -auto-approve
